<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <!-- Dorfl v8 LOCKUP: the TALL head + wordmark + Title-Case tagline. -->
  <defs>
    <filter id="ll8" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="980" height="300" fill="#23201C"/>
  <!-- tall head -->
  <g transform="translate(70,24) scale(0.74)">
    <rect x="20" y="16" width="200" height="252" rx="28" fill="#A4543C"/>
    <path d="M120 16 H192 Q220 16 220 44 V240 Q220 268 192 268 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="74" y="262" width="92" height="26" rx="10" fill="#A4543C"/>
    <path d="M120 262 H166 V288 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="46" y="92" width="148" height="72" rx="15" fill="#1C1813"/>
    <rect x="54" y="100" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#ll8)"/>
    <path d="M82 114 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="138" width="34" height="11" rx="5.5" fill="#1C1813"/>
    <rect x="91" y="212" width="58" height="10" rx="5" fill="#7E3D2C"/>
  </g>
  <!-- wordmark + tagline -->
  <text x="300" y="158" font-family="Georgia, serif" font-size="104" letter-spacing="6" fill="#E9D9C7">dorfl</text>
  <text x="304" y="206" font-family="Menlo, monospace" font-size="26" letter-spacing="1" fill="#C9745A">It Claims Its Own Work</text>
</svg>
