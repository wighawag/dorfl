<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dorfl v9b ICON: the canonical square+jaw head on a slate tile (app icon,
       og-image, large favicon). Head geometry identical to dorfl-v9b-head. -->
  <defs>
    <filter id="ic9b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#23201C"/>
  <!-- head content local: x10..230 (w220), y8..236 (incl jaw). center on 512:
       cx: (512-220)/2 - 10 = 136 ; cy: (512-228)/2 - 8 = 134 -->
  <g transform="translate(136,134) scale(1.0)">
    <rect x="10" y="8" width="220" height="208" rx="30" fill="#A4543C"/>
    <path d="M120 8 H200 Q230 8 230 38 V186 Q230 216 200 216 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="74" y="210" width="92" height="26" rx="10" fill="#A4543C"/>
    <path d="M120 210 H166 V236 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="46" y="64" width="148" height="72" rx="15" fill="#1C1813"/>
    <rect x="54" y="72" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#ic9b)"/>
    <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#1C1813"/>
    <rect x="91" y="172" width="58" height="10" rx="5" fill="#7E3D2C"/>
  </g>
</svg>
