<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Dorfl v9b MONO: single ink. canonical square+jaw head, face knocked out
       as negative space. Works in one color (terminal, stamp, print, inverted).
       Mono drops the carved shaded half (the only allowed simplification). -->
  <rect x="0" y="0" width="256" height="256" rx="44" fill="#E9D9C7"/>
  <!-- head + jaw as solid ink. source head x10..230 w220 h(8..236=228).
       fit into 256 with margin: scale 0.82, translate to center.
       sx: (256 - 220*0.82)/2 - 10*0.82 = (256-180.4)/2 - 8.2 = 37.8-8.2 = 29.6
       sy: (256 - 228*0.82)/2 - 8*0.82 = (256-186.96)/2 - 6.56 = 34.5-6.56 = 27.96 -->
  <g transform="translate(29.6,28) scale(0.82)" fill="#2A2622">
    <rect x="10" y="8" width="220" height="208" rx="30"/>
    <rect x="74" y="210" width="92" height="26" rx="10"/>
  </g>
  <!-- visor knocked out + face ink, same transform -->
  <g transform="translate(29.6,28) scale(0.82)">
    <rect x="46" y="64" width="148" height="72" rx="15" fill="#E9D9C7"/>
    <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#2A2622" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#2A2622"/>
    <rect x="91" y="172" width="58" height="10" rx="5" fill="#E9D9C7"/>
  </g>
</svg>
