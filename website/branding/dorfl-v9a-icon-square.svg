<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dorfl v9 SQUARE icon (large/medium tiles: app icon, GitHub org avatar).
       Strategy 3: the WHOLE tall head, centered with breathing room, the slate
       TILE carries the squareness. Head is NOT re-proportioned — same creature,
       just placed on a square ground with a faint baseline so it 'stands'. -->
  <defs>
    <filter id="sq9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#23201C"/>
  <!-- faint ground line: gives the square purpose + lets the tall head 'stand' -->
  <rect x="150" y="432" width="212" height="6" rx="3" fill="#000000" opacity="0.16"/>
  <!-- whole tall head, CENTERED. content spans local x10..210 (w200) and
       y6..278 (h272). tile 512. center x: (512-200)/2 - 10 = 146.
       center y: (512-272)/2 - 6 = 114. -->
  <g transform="translate(146,114) scale(1.0)">
    <rect x="10" y="6" width="200" height="252" rx="28" fill="#A4543C"/>
    <path d="M110 6 H182 Q210 6 210 34 V230 Q210 258 182 258 H110 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="64" y="252" width="92" height="26" rx="10" fill="#A4543C"/>
    <path d="M110 252 H156 V278 H110 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="36" y="82" width="148" height="72" rx="15" fill="#1C1813"/>
    <rect x="44" y="90" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#sq9)"/>
    <path d="M72 104 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="116" y="128" width="34" height="11" rx="5.5" fill="#1C1813"/>
    <rect x="81" y="202" width="58" height="10" rx="5" fill="#7E3D2C"/>
  </g>
</svg>
