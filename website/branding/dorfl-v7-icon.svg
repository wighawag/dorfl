<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dorfl v7 ICON: square, no wordmark. centered head. for app icons / favicons. -->
  <defs>
    <filter id="i7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#23201C"/>
  <!-- head, centered & enlarged to fill the tile -->
  <g transform="translate(0,8)">
    <path d="M120 168 Q120 136 152 136 L360 136 Q392 136 392 168
             L392 384 Q392 416 360 416 L312 416 L312 432 Q312 440 304 440
             L208 440 Q200 440 200 432 L200 416 L152 416 Q120 416 120 384 Z"
          fill="#A4543C"/>
    <path d="M256 136 H360 Q392 136 392 168 V384 Q392 416 360 416 H312 V432 Q312 440 304 440 H256 Z"
          fill="#8A4632" opacity="0.42"/>
    <!-- visor -->
    <rect x="160" y="222" width="192" height="80" rx="18" fill="#1C1813"/>
    <rect x="169" y="231" width="174" height="62" rx="13" fill="#FFB23E" filter="url(#i7)"/>
    <!-- >_ eyes -->
    <path d="M200 248 l25 14 l-25 14" fill="none" stroke="#1C1813" stroke-width="15"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="252" y="272" width="40" height="13" rx="6.5" fill="#1C1813"/>
    <!-- deadpan mouth -->
    <rect x="222" y="356" width="68" height="11" rx="5.5" fill="#7E3D2C"/>
  </g>
</svg>
