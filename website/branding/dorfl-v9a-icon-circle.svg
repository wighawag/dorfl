<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dorfl v9 CIRCLE avatar. A circle is forgiving of a tall head (shared
       vertical axis), so: whole tall head centered = a 'portrait medallion'.
       Same creature, same proportion, just centered in a disc. -->
  <defs>
    <filter id="ci9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="disc"><circle cx="256" cy="256" r="256"/></clipPath>
  </defs>
  <g clip-path="url(#disc)">
    <rect x="0" y="0" width="512" height="512" fill="#23201C"/>
    <!-- whole tall head CENTERED in the disc. scale 0.96: content w200*0.96=192,
         h272*0.96=261.12. center x: (512-192)/2 - 10*0.96 = 160-9.6 = 150.4.
         center y: (512-261.12)/2 - 6*0.96 = 125.44-5.76 = 119.68. -->
    <g transform="translate(150.4,119.7) scale(0.96)">
      <rect x="10" y="6" width="200" height="252" rx="28" fill="#A4543C"/>
      <path d="M110 6 H182 Q210 6 210 34 V230 Q210 258 182 258 H110 Z" fill="#8A4632" opacity="0.42"/>
      <rect x="64" y="252" width="92" height="26" rx="10" fill="#A4543C"/>
      <path d="M110 252 H156 V278 H110 Z" fill="#8A4632" opacity="0.42"/>
      <rect x="36" y="82" width="148" height="72" rx="15" fill="#1C1813"/>
      <rect x="44" y="90" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#ci9)"/>
      <path d="M72 104 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="116" y="128" width="34" height="11" rx="5.5" fill="#1C1813"/>
      <rect x="81" y="202" width="58" height="10" rx="5" fill="#7E3D2C"/>
    </g>
  </g>
</svg>
