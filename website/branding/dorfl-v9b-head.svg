<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <!-- Dorfl v9b — canonical SQUARE head (the creature). Face byte-identical to
       v8-square. This is the avatar/tile/favicon master. The hero (v9b-hero)
       shows this SAME head atop a body. -->
  <defs>
    <filter id="hb9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- head content local box: x10 y8 w220 h208 ; jaw to y236. centered in 260 -->
  <g transform="translate(20,12)">
    <rect x="10" y="8" width="220" height="208" rx="30" fill="#A4543C"/>
    <path d="M120 8 H200 Q230 8 230 38 V186 Q230 216 200 216 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="74" y="210" width="92" height="26" rx="10" fill="#A4543C"/>
    <path d="M120 210 H166 V236 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="46" y="64" width="148" height="72" rx="15" fill="#1C1813"/>
    <rect x="54" y="72" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#hb9)"/>
    <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#1C1813"/>
    <rect x="91" y="172" width="58" height="10" rx="5" fill="#7E3D2C"/>
  </g>
</svg>
