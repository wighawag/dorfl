<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <!-- Dorfl v9a LOCKUP: the canonical TALL head (head-only) + wordmark + tagline. -->
  <defs>
    <filter id="la9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="980" height="300" fill="#23201C"/>
  <!-- tall head (v9a geometry), vertically centered in the 300-tall band -->
  <g transform="translate(72,18) scale(0.84)">
    <rect x="10" y="6" width="200" height="252" rx="28" fill="#A4543C"/>
    <path d="M110 6 H182 Q210 6 210 34 V230 Q210 258 182 258 H110 Z" fill="#8A4632" opacity="0.42"/>
