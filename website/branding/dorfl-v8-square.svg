<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <!-- Dorfl v8 SQUARE head — canonical "fills a tile" fork (avatars/favicons/UI).
       IDENTICAL visor/eyes/mouth/jaw + stroke weights as v8-tall; ONLY the head
       box ratio differs (square: 220x208). Same jaw, same face, same glow. -->
  <defs>
    <filter id="s8" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(10,18)">
    <!-- HEAD box: x10 y8 w220 h208 r30 (square-ish) -->
    <rect x="10" y="8" width="220" height="208" rx="30" fill="#A4543C"/>
    <path d="M120 8 H200 Q230 8 230 38 V186 Q230 216 200 216 H120 Z" fill="#8A4632" opacity="0.42"/>
    <!-- JAW: same block as tall (w92 h26 r10), flush at head bottom (216), centered (x74) -->
    <rect x="74" y="210" width="92" height="26" rx="10" fill="#A4543C"/>
    <path d="M120 210 H166 V236 H120 Z" fill="#8A4632" opacity="0.42"/>

    <!-- VISOR identical geometry to tall (w148 h72), centered on this head -->
    <rect x="46" y="64" width="148" height="72" rx="15" fill="#1C1813"/>
    <rect x="54" y="72" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#s8)"/>
    <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#1C1813"/>
    <!-- deadpan mouth, same size, placed between visor and jaw -->
    <rect x="91" y="172" width="58" height="10" rx="5" fill="#7E3D2C"/>
  </g>
</svg>
