<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Dorfl v8 MONO: single ink, the SQUARE head (best for tile/avatar/favicon).
       face knocked out as negative space. same proportions as v8-square. -->
  <rect x="0" y="0" width="256" height="256" rx="44" fill="#E9D9C7"/>
  <g transform="translate(20,28) scale(0.92)" fill="#2A2622">
    <rect x="10" y="8" width="220" height="208" rx="30"/>
    <rect x="74" y="210" width="92" height="26" rx="10"/>
  </g>
  <!-- visor knocked out + face ink (transform-matched to head above) -->
  <g transform="translate(20,28) scale(0.92)">
    <rect x="46" y="64" width="148" height="72" rx="15" fill="#E9D9C7"/>
    <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#2A2622" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#2A2622"/>
    <rect x="91" y="172" width="58" height="10" rx="5" fill="#E9D9C7"/>
  </g>
