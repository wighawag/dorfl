<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <!-- Dorfl v9b LOCKUP: the canonical SQUARE head + just a BIT OF CHEST peeking
       up under it (a bust). Not a full figure — a sliver of shoulders so he
       reads as a body, not a floating head. + wordmark + tagline. -->
  <defs>
    <filter id="lb9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- clip the bust at the lockup's bottom edge so the chest is 'cut off' -->
    <clipPath id="band9b"><rect x="0" y="0" width="980" height="300"/></clipPath>
  </defs>
  <rect x="0" y="0" width="980" height="300" fill="#23201C"/>

  <g clip-path="url(#band9b)">
    <!-- BUST: head + a bit of chest. drawn in one local space then placed.
         square head box (220x208) + jaw, with shoulders+chest extending below,
         cut off by the band bottom. -->
    <g transform="translate(74,46) scale(0.86)">
      <!-- shoulders + chest (behind head). broad, with carved shaded half +
           a chem seam. extends below the visible band (clipped). -->
      <rect x="-2" y="250" width="244" height="200" rx="36" fill="#A4543C"/>
      <path d="M120 250 H206 Q242 250 242 286 V450 H120 Z" fill="#8A4632" opacity="0.42"/>
      <line x1="-2" y1="312" x2="242" y2="312" stroke="#7E3D2C" stroke-width="5" opacity="0.45"/>
      <!-- short neck join -->
      <rect x="80" y="226" width="80" height="34" rx="12" fill="#9B4E38"/>

      <!-- SQUARE head (canonical face) on top -->
      <rect x="10" y="8" width="220" height="208" rx="30" fill="#A4543C"/>
      <path d="M120 8 H200 Q230 8 230 38 V186 Q230 216 200 216 H120 Z" fill="#8A4632" opacity="0.42"/>
      <rect x="46" y="64" width="148" height="72" rx="15" fill="#1C1813"/>
      <rect x="54" y="72" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#lb9)"/>
      <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#1C1813"/>
      <rect x="91" y="172" width="58" height="10" rx="5" fill="#7E3D2C"/>
    </g>
  </g>

  <!-- wordmark + Title-Case tagline -->
  <text x="300" y="158" font-family="Georgia, serif" font-size="104" letter-spacing="6" fill="#E9D9C7">dorfl</text>
  <text x="304" y="206" font-family="Menlo, monospace" font-size="26" letter-spacing="1" fill="#C9745A">It Claims Its Own Work</text>
</svg>
