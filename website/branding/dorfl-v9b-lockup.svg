<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <!-- Dorfl v9b LOCKUP (corrected): the canonical SQUARE head — WITH its jaw,
       same geometry as v9b-head — and a bit of chest peeking up that TUCKS
       UNDER the jaw (neck meets chin, as a real bust does). The head shape is
       unchanged; the body is just shown partially and cut off by the band. -->
  <defs>
    <filter id="lb9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="band9b"><rect x="0" y="0" width="980" height="300"/></clipPath>
  </defs>
  <rect x="0" y="0" width="980" height="300" fill="#23201C"/>

  <g clip-path="url(#band9b)">
    <g transform="translate(74,40) scale(0.86)">
      <!-- shoulders + chest, BEHIND the head, rising to tuck under the jaw.
           broad (flares wider than the head), carved shaded half + chem seam. -->
      <rect x="-12" y="248" width="264" height="210" rx="40" fill="#A4543C"/>
      <path d="M120 248 H212 Q252 248 252 288 V458 H120 Z" fill="#8A4632" opacity="0.42"/>
      <line x1="-12" y1="318" x2="252" y2="318" stroke="#7E3D2C" stroke-width="5" opacity="0.45"/>

      <!-- SQUARE head WITH jaw (identical to v9b-head). neck tucks under jaw. -->
      <rect x="10" y="8" width="220" height="208" rx="30" fill="#A4543C"/>
      <path d="M120 8 H200 Q230 8 230 38 V186 Q230 216 200 216 H120 Z" fill="#8A4632" opacity="0.42"/>
      <!-- jaw: PRESENT, same as avatar -->
      <rect x="74" y="210" width="92" height="26" rx="10" fill="#A4543C"/>
      <path d="M120 210 H166 V236 H120 Z" fill="#8A4632" opacity="0.42"/>
      <!-- face -->
      <rect x="46" y="64" width="148" height="72" rx="15" fill="#1C1813"/>
      <rect x="54" y="72" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#lb9)"/>
      <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#1C1813"/>
      <rect x="91" y="172" width="58" height="10" rx="5" fill="#7E3D2C"/>
    </g>
  </g>

  <text x="300" y="158" font-family="Georgia, serif" font-size="104" letter-spacing="6" fill="#E9D9C7">dorfl</text>
  <text x="304" y="206" font-family="Menlo, monospace" font-size="26" letter-spacing="1" fill="#C9745A">It Claims Its Own Work</text>
</svg>
