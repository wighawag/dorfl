<svg xmlns="http://www.w3.org/2000/svg" width="420" height="520" viewBox="0 0 420 520">
  <!-- Dorfl v9b HERO — the SAME square head, now standing on a stout clay body.
       A humble blocky golem: broad shoulders, a simple torso, stumpy arms held
       at his sides, short legs/feet. Clay, deadpan, no detail-arms-race.
       Small contexts crop just the head; the hero shows the whole creature. -->
  <defs>
    <filter id="hr9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="210" cy="494" rx="120" ry="16" fill="#000000" opacity="0.15"/>

  <!-- ===== BODY (drawn first, behind the head) ===== -->
  <!-- torso: a broad, slightly tapered clay block -->
  <rect x="118" y="300" width="184" height="150" rx="26" fill="#A4543C"/>
  <!-- carved shaded half of torso -->
  <path d="M210 300 H276 Q302 300 302 326 V424 Q302 450 276 450 H210 Z" fill="#8A4632" opacity="0.42"/>
  <!-- chem seam across the chest (the dry-stack / file-per-slice rhyme) -->
  <line x1="118" y1="370" x2="302" y2="370" stroke="#7E3D2C" stroke-width="4" opacity="0.45"/>

  <!-- stumpy arms at the sides -->
  <rect x="86" y="312" width="40" height="118" rx="20" fill="#9B4E38"/>
  <rect x="294" y="312" width="40" height="118" rx="20" fill="#8A4632"/>

  <!-- short legs / feet -->
  <rect x="150" y="448" width="46" height="40" rx="12" fill="#9B4E38"/>
  <rect x="224" y="448" width="46" height="40" rx="12" fill="#8A4632"/>

  <!-- neck join (subtle) -->
  <rect x="176" y="286" width="68" height="28" rx="10" fill="#9B4E38"/>

  <!-- ===== HEAD (canonical square head, same face) ===== -->
  <g transform="translate(95,40)">
    <rect x="10" y="8" width="220" height="208" rx="30" fill="#A4543C"/>
    <path d="M120 8 H200 Q230 8 230 38 V186 Q230 216 200 216 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="74" y="210" width="92" height="26" rx="10" fill="#A4543C"/>
    <path d="M120 210 H166 V236 H120 Z" fill="#8A4632" opacity="0.42"/>
    <rect x="46" y="64" width="148" height="72" rx="15" fill="#1C1813"/>
    <rect x="54" y="72" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#hr9)"/>
    <path d="M82 86 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="126" y="110" width="34" height="11" rx="5.5" fill="#1C1813"/>
    <rect x="91" y="172" width="58" height="10" rx="5" fill="#7E3D2C"/>
  </g>
</svg>
