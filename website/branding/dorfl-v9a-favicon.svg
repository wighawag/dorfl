<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dorfl v9 FAVICON / tiny square. Strategy 1: FACE-CROP of the SAME tall
       head — zoomed so the visor face fills the frame and the forehead/chin
       bleed past the tile edges. Recognizable '>_' stays big at 16px.
       NOT a re-proportion: it's the identical head, scaled up and clipped. -->
  <defs>
    <filter id="fv9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tile"><rect x="0" y="0" width="512" height="512" rx="96"/></clipPath>
  </defs>
  <g clip-path="url(#tile)">
    <rect x="0" y="0" width="512" height="512" fill="#23201C"/>
    <!-- FACE+SHOULDERS crop (not face-only): keep the visor big BUT still show
         the head's side walls and the deadpan mouth, so it reads as a head.
         scale 1.6. center the head's VERTICAL midpoint a touch high so the
         visor dominates while the mouth stays in frame.
         head content local: x 10..210 (mid 110), y 6..278.
         center x on tile: tx = 256 - 110*1.6 = 80.
         pick visual center y ~ 150 (between visor 118 and mouth 207):
         ty = 256 - 150*1.6 = 16. -->
    <g transform="translate(80,16) scale(1.6)">
      <rect x="10" y="6" width="200" height="252" rx="28" fill="#A4543C"/>
      <path d="M110 6 H182 Q210 6 210 34 V230 Q210 258 182 258 H110 Z" fill="#8A4632" opacity="0.42"/>
      <!-- jaw (so the head reads complete now that the bottom is in frame) -->
      <rect x="64" y="252" width="92" height="26" rx="10" fill="#A4543C"/>
      <path d="M110 252 H156 V278 H110 Z" fill="#8A4632" opacity="0.42"/>
      <rect x="36" y="82" width="148" height="72" rx="15" fill="#1C1813"/>
      <rect x="44" y="90" width="132" height="56" rx="11" fill="#FFB23E" filter="url(#fv9)"/>
      <path d="M72 104 l21 14 l-21 14" fill="none" stroke="#1C1813" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="116" y="128" width="34" height="11" rx="5.5" fill="#1C1813"/>
      <rect x="81" y="202" width="58" height="10" rx="5" fill="#7E3D2C"/>
    </g>
  </g>
</svg>
